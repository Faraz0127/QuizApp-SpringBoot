spring.application.name=quizapp

# ===============================
# DATABASE CONFIG (AIVEN MYSQL)
# ===============================
# Use environment variables set in Render dashboard
spring.datasource.url=${DB_URL:jdbc:mysql://quizapp-db-quizappdb01.e.aivencloud.com:10148/defaultdb?useSSL=true&requireSSL=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:avnadmin}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===============================
# SERVER
# ===============================
server.port=${PORT:8080}
spring.profiles.active=prod